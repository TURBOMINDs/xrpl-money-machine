<!DOCTYPE html>
<html>
<head>
  <title>XRPL Universal Money Machine</title>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at top, #0a0a0a, #000000);
      color: white;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      color: gold;
      font-size: 42px;
      margin-top: 40px;
      text-shadow: 0 0 15px orange;
    }

    p {
      color: #ccc;
    }

    .container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 40px;
    }

    .card {
      border: 1px solid #333;
      border-radius: 15px;
      padding: 25px;
      margin: 15px;
      width: 250px;
      background: #111;
      box-shadow: 0 0 20px rgba(255,140,0,0.4);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px orange;
    }

    .btn {
      margin-top: 15px;
      padding: 10px 20px;
      background: linear-gradient(45deg, orange, gold);
      border: none;
      color: black;
      font-weight: bold;
      cursor: pointer;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<h1>🚀 XRPL Universal Money Machine</h1>
<p>System is LIVE</p>
<p>Powered by XEMA</p>

<div class="container">

  <div class="card">
    <h2>Basic Access</h2>
    <p>5 AMMs</p>
    <p>$10 / month</p>
    <button class="btn">Subscribe</button>
  </div>

  <div class="card">
    <h2>Plus Access</h2>
    <p>15 AMMs</p>
    <p>$15 / month</p>
    <button class="btn">Upgrade</button>
  </div>

  <div class="card">
    <h2>Ultimate Pro</h2>
    <p>50 AMMs</p>
    <p>$25 / month</p>
    <button class="btn">Go Pro</button>
  </div>

</div>

</body>
</html>
