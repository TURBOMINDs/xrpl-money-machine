<!DOCTYPE html>
<html>
<head>
  <title>XRPL Universal Money Machine</title>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at top, #0a0a0a, #000);
      color: white;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      color: gold;
      font-size: 42px;
      margin-top: 40px;
      text-shadow: 0 0 15px orange;
    }

    .container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 40px;
    }

    .card {
      border: 1px solid #333;
      border-radius: 15px;
      padding: 25px;
      margin: 15px;
      width: 250px;
      background: #111;
      box-shadow: 0 0 20px rgba(255,140,0,0.4);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px orange;
    }

    .btn {
      margin-top: 15px;
      padding: 10px 20px;
      background: linear-gradient(45deg, orange, gold);
      border: none;
      color: black;
      font-weight: bold;
      cursor: pointer;
      border-radius: 6px;
    }

    .wallet-box {
      margin-top: 20px;
    }

    .wallet-btn {
      padding: 14px 28px;
      background: linear-gradient(45deg, #10e0ff, #00cfff);
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .highlight {
      color: yellow;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>🚀 XRPL Universal Money Machine</h1>
<p>System is LIVE</p>
<p style="color: gold;">Powered by XEMA</p>

<div class="wallet-box">
  <button id="connectBtn" class="wallet-btn">Connect Xaman Wallet</button>
  <p id="walletStatus">Status: Not connected</p>
</div>

<div class="container">

  <div class="card">
    <h2>Basic Access</h2>
    <p>5 AMMs</p>
    <p>2 Swaps / 24h</p>
    <p id="trialText">3 Day Free Trial</p>
    <p>$7 / month</p>
    <button id="trialBtn" class="btn">Start Trial</button>
  </div>

  <div class="card">
    <h2>Plus Access</h2>
    <p>15 AMMs</p>
    <p>5 Swaps / 24h</p>
    <p>$15 / month</p>
    <button id="plusBtn" class="btn">Upgrade</button>
  </div>

  <div class="card">
    <h2>Ultimate Pro</h2>
    <p>50 AMMs</p>
    <p>15 Swaps / 24h</p>
    <p>$25 / month</p>
    <button id="proBtn" class="btn">Go Pro</button>
  </div>

</div>

<script>

// ===== STATE =====
let walletConnected = localStorage.getItem("walletConnected") === "true";
let tier = localStorage.getItem("tier") || "none";
let trialEnd = parseInt(localStorage.getItem("trialEnd") || "0");

// ===== ELEMENTS =====
const statusEl = document.getElementById("walletStatus");
const connectBtn = document.getElementById("connectBtn");
const trialBtn = document.getElementById("trialBtn");
const plusBtn = document.getElementById("plusBtn");
const proBtn = document.getElementById("proBtn");
const trialText = document.getElementById("trialText");

// ===== UPDATE UI =====
function updateUI() {
  const now = Date.now();

  if (trialEnd && now < trialEnd) {
    const days = Math.ceil((trialEnd - now) / (1000*60*60*24));
    statusEl.innerHTML = `Status: Trial Active <span class="highlight">(${days} Days Remaining)</span>`;
    trialText.classList.add("highlight");
    return;
  }

  if (tier === "plus") {
    statusEl.innerHTML = `Status: <span class="highlight">Plus Active</span>`;
    return;
  }

  if (tier === "pro") {
    statusEl.innerHTML = `Status: <span class="highlight">Ultimate Pro Active</span>`;
    return;
  }

  if (walletConnected) {
    statusEl.innerHTML = "Status: Connected";
    trialText.classList.add("highlight");
  } else {
    statusEl.innerHTML = "Status: Not connected";
  }
}

updateUI();

// ===== CONNECT WALLET =====
connectBtn.addEventListener("click", () => {
  walletConnected = true;
  localStorage.setItem("walletConnected", "true");

  connectBtn.innerText = "Wallet Connected ✅";

  updateUI();
  alert("Xaman Wallet connected!");
});

// ===== START TRIAL =====
trialBtn.addEventListener("click", () => {

  if (!walletConnected) {
    alert("Connect your Xaman Wallet first");
    return;
  }

  const now = Date.now();

  if (tier === "plus" || tier === "pro") {
    alert("You already have a paid plan.");
    return;
  }

  if (trialEnd && now < trialEnd) {
    alert("Trial already active.");
    return;
  }

  trialEnd = now + (3 * 24 * 60 * 60 * 1000);
  tier = "trial";

  localStorage.setItem("trialEnd", trialEnd);
  localStorage.setItem("tier", "trial");

  updateUI();
  alert("🔥 3 Day Trial Activated!");
});

// ===== PLUS =====
plusBtn.addEventListener("click", () => {

  if (!walletConnected) {
    alert("Connect your Xaman Wallet first");
    return;
  }

  tier = "plus";
  trialEnd = 0;

  localStorage.setItem("tier", "plus");
  localStorage.removeItem("trialEnd");

  updateUI();
  alert("✅ Upgraded to Plus!");
});

// ===== PRO =====
proBtn.addEventListener("click", () => {

  if (!walletConnected) {
    alert("Connect your Xaman Wallet first");
    return;
  }

  tier = "pro";
  trialEnd = 0;

  localStorage.setItem("tier", "pro");
  localStorage.removeItem("trialEnd");

  updateUI();
  alert("🚀 Ultimate Pro Activated!");
});

</script>

</body>
</html>
